server:
  port: 8080

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
        - RemoveRequestHeader=X-Internal-Service-Token
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origins: "*"
            allowed-methods: "*"
            allowed-headers: "*"

springdoc:
  api-docs:
    # path próprio do gateway; não desabilitar (desativaria toda a autoconfig do springdoc, inclusive o Swagger UI)
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: 1 - User Service (auth/usuários)
        url: /openapi/user-service
      - name: 2 - Patient Service (pacientes)
        url: /openapi/patient-service
      - name: 3 - Record Service (prontuários)
        url: /openapi/record-service
      - name: 4 - Triage Service (triagem)
        url: /openapi/triage-service
      - name: 5 - Notification Service (notificações)
        url: /openapi/notification-service

security:
  jwt:
    jwk-set-uri: ${SECURITY_JWT_JWK_SET_URI:http://localhost:8081/.well-known/jwks.json}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      user-service-cb:
        base-config: default
      patient-service-cb:
        base-config: default
      record-service-cb:
        base-config: default
      triage-service-cb:
        base-config: default
      notification-service-cb:
        base-config: default
  timelimiter:
    configs:
      default:
        timeout-duration: 5s
    instances:
      user-service-cb:
        base-config: default
      patient-service-cb:
        base-config: default
      record-service-cb:
        base-config: default
      triage-service-cb:
        base-config: default
      notification-service-cb:
        base-config: default

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
  metrics:
    export:
      prometheus:
        enabled: true
